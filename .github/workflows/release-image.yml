name: Release image

# Build and publish the default-feature Junos/SRX rust-junosmcp image to GHCR
# on every version tag (v1.2.3).
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the image, e.g. v0.7.0 (-> tags 0.7.0, 0.7, latest)'
        required: true
      ref:
        description: 'Git ref/commit to build (default: the branch this workflow runs from, usually main). Use this to backfill a release whose own tagged tree predates a Dockerfile fix.'
        required: false
        default: ''

env:
  # GHCR requires a lowercase image path; the repo name is mixed-case.
  IMAGE: ghcr.io/fastrevmd-lab/rust-junosmcp

jobs:
  build-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Build source: an explicit ref if given, else the dispatched branch
          # (main) on manual runs, or the pushed tag on tag-triggered runs.
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # v0.7.0 -> tags 0.7.0, 0.7, latest. The `value=` override makes the
          # manual workflow_dispatch path derive the version from the input;
          # on a tag push the input is empty and metadata falls back to the ref.
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.inputs.version }}
            type=raw,value=latest

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test container runtime and SCP transfers
        run: ./packaging/tests/container-scp-smoke.sh

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
