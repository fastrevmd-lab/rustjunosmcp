name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout RustJunosMCP
        uses: actions/checkout@v5
        with:
          path: RustJunosMCP

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: RustJunosMCP

      - name: Format check (our packages)
        working-directory: RustJunosMCP
        run: cargo fmt -p rust-junosmcp-core -p rust-junosmcp -p rust-junosmcp-auth -p rust-srxmcp-core -p rust-srxmcp -- --check

      - name: Clippy (our packages)
        working-directory: RustJunosMCP
        run: cargo clippy -p rust-junosmcp-core -p rust-junosmcp -p rust-junosmcp-auth -p rust-srxmcp-core -p rust-srxmcp --all-targets -- -D warnings

      - name: Build
        working-directory: RustJunosMCP
        run: cargo build --workspace

      - name: Unit + smoke tests
        working-directory: RustJunosMCP
        run: cargo test --workspace

  audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          path: RustJunosMCP
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - working-directory: RustJunosMCP
        run: cargo audit

  packaging:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout RustJunosMCP
        uses: actions/checkout@v5
        with:
          path: RustJunosMCP

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: RustJunosMCP

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Shellcheck packaging scripts
        working-directory: RustJunosMCP
        run: shellcheck scripts/package-lxc.sh scripts/test-lxc-distributions.sh packaging/lxc/install.sh packaging/tests/*.sh packaging/tests/fixtures/scp-server/entrypoint.sh

      - name: Build LXC package
        working-directory: RustJunosMCP
        run: ./scripts/package-lxc.sh

      - name: Package and MCP endpoint smoke test
        working-directory: RustJunosMCP
        run: ./packaging/tests/package-smoke.sh dist/rust-junosmcp_*_amd64.tar.gz

      - name: Debian and Ubuntu install smoke tests
        working-directory: RustJunosMCP
        run: ./scripts/test-lxc-distributions.sh dist/rust-junosmcp_*_amd64.tar.gz

  container:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout RustJunosMCP
        uses: actions/checkout@v5
        with:
          path: RustJunosMCP

      - name: Container runtime and SCP integration smoke test
        working-directory: RustJunosMCP
        run: ./packaging/tests/container-scp-smoke.sh
