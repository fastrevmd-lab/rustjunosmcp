#:schema https://developers.openai.com/codex/config-schema.json

approval_policy = "on-request"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = false
writable_roots = []
exclude_tmpdir_env_var = true
exclude_slash_tmp = true

[mcp_servers.gbrain]
enabled = false

[mcp_servers.hpe-mcp]
enabled = false

[mcp_servers.proxmox-mcp]
enabled = false

[mcp_servers.unifi-mcp]
enabled = false

[mcp_servers.panos-mcp]
enabled = false

[mcp_servers.rust-junosmcp]
enabled = true
enabled_tools = ["get_router_list", "gather_device_facts", "get_junos_config", "junos_config_diff", "commit_check_config"]
default_tools_approval_mode = "writes"

[mcp_servers.rust-srxmcp]
enabled = true
enabled_tools = ["srxmcp_status", "get_srx_security_services_status", "check_srx_feature_license", "get_chassis_cluster_status", "validate_chassis_cluster_health", "vpn_lifecycle_report"]
default_tools_approval_mode = "writes"

[mcp_servers.openaiDeveloperDocs]
enabled = true
enabled_tools = ["search_openai_docs", "fetch_openai_doc"]
